// EMAIL PARSER — Apple Store / 買取業者メールから情報抽出

function parseEmail(raw) {
  const text = raw.replace(/\r/g,"");
  const out = { type:"unknown", orderNumber:"", model:"", capacity:"", color:"", amount:0, confidence:0, raw:text.slice(0,200) };
  // メール種別判定
  const typeRules = [
    { type:"order",    re:/ご注文ありがとうござい|Your Apple order|注文確認|お買い上げいただき/ },
    { type:"delayed",  re:/お届け予定.*(変更|延期)|配送.*(遅延|延期)|到着予定.*延び/ },
    { type:"invoiced", re:/請求書|ご請求|ご利用明細|invoice/i },
    { type:"received", re:/お届け(完了|しました)|配送完了|delivered/i },
    { type:"kaitori",  label:"買取", re:/買取(金額|査定|完了)|査定結果/ },
  ];
  for (const r of typeRules) { if (r.re.test(text)) { out.type=r.type; out.confidence+=30; break; } }
  // 注文番号: Apple は W で始まる10桁 or 注文番号ラベル
  const on = text.match(/\b(W\d{9,11})\b/) || text.match(/注文番号[:：\s]*([A-Z0-9\-]{6,})/i) || text.match(/Order\s*(?:number|#)[:：\s]*([A-Z0-9\-]{6,})/i);
  if (on) { out.orderNumber = on[1]; out.confidence+=25; }
  // モデル
  const modelMatch = text.match(/iPhone\s*1[567]\s*(Pro Max|Pro|Air|Plus|mini)?/i);
  if (modelMatch) { out.model = modelMatch[0].replace(/\s+/g," ").trim(); out.confidence+=15; }
  // 容量
  const capMatch = text.match(/(256|512)\s*GB|\b(1|2)\s*TB\b/i);
  if (capMatch) { out.capacity = capMatch[0].replace(/\s+/g,"").toUpperCase(); out.confidence+=10; }
  // カラー
  const colors = ["シルバー","オレンジ","ディープブルー","ラベンダー","セージ","ミストブルー","ホワイト","ブラック","ゴールド","ナチュラルチタニウム","ブラックチタニウム","ホワイトチタニウム","デザートチタニウム"];
  for (const c of colors) { if (text.includes(c)) { out.color=c; out.confidence+=10; break; } }
  // 金額
  const amt = text.match(/¥\s*([\d,]{5,})|([\d,]{5,})\s*円/);
  if (amt) { out.amount = Number((amt[1]||amt[2]).replace(/,/g,"")); out.confidence+=10; }
  return out;
}

function useLocal(key, init) {
  const [v, setV] = useState(() => {
    try { return JSON.parse(localStorage.getItem(key) ?? "null") ?? init; } catch { return init; }
  });
  function set(x) {
    const next = typeof x === "function" ? x(v) : x;
    setV(next);
    try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
  }
  return [v, set];
}
// ============================================================

function genVariants(base) {
  const s = base.street;
  return [
    s,
    s.replace(/(\d+)-(\d+)-(\d+)/, (_,a,b,c)=>`${a}丁目${b}番地${c}号`),
    s.replace(/(\d)/g, n=>"０１2345６７８９"[n]).replace(/-/g,"－"),
    s.replace(/-(\d+)-/, "-$1番"),
  ].filter((v,i,a)=>a.indexOf(v)===i).map((street,i)=>({
    variant: i+1,
    full: `〒${base.zip} ${base.pref}${base.city}${street}${base.building?" "+base.building:""}`,
  }));
}

function CardManager({ cards, setCards, orders }) {
  const [showAdd,setShowAdd] = useState(false);
  const [editId,setEditId] = useState(null);
  const blank = { nickname:"", brand:"VISA", last4:"", type:"通常カード", color:PALETTE[0], limitMonth:"", memo:"", status:"active" };
  const [form,setForm] = useState(blank);
  function save() {
    if (!form.nickname.trim()) return;
    if (editId) {
      setCards(p=>p.map(c=>c.id===editId?{...c,...form}:c));
      setEditId(null);
    } else {
      setCards(p=>[...p,{...form,id:Date.now(),createdAt:new Date().toISOString().split("T")[0]}]);
    }
    setForm(blank); setShowAdd(false);
  }
  function startEdit(c) { setForm({nickname:c.nickname,brand:c.brand,last4:c.last4||"",type:c.type,color:c.color||PALETTE[0],limitMonth:c.limitMonth||"",memo:c.memo||"",status:c.status||"active"}); setEditId(c.id); setShowAdd(true); }
  function del(id) { if(confirm("削除しますか？")) setCards(p=>p.filter(c=>c.id!==id)); }
  // 集計: カードごとの使用台数と合計金額
  function stats(cardId) {
    let count = 0, total = 0;
    orders.forEach(o=>{
      if (o.payments && o.payments.length) {
        const hit = o.payments.filter(p=>p.cardId===cardId);
        if (hit.length) { count++; total += hit.reduce((s,p)=>s+Number(p.amount||0),0); }
      }
    });
    return { count, total };
  }
  const active = cards.filter(c=>c.status!=="retired");

            <div>

              <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                {PALETTE.map(c=>(

        {cards.map(c=>{

                <span style={{fontSize:12,color:"#aaa"}}>🛒 {st.count}台</span>
                <span style={{fontSize:12,color:"#4fcf7a",fontWeight:700}}>💴 ¥{st.total.toLocaleString()}</span>

              {limit>0 && (

                  <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#666",marginBottom:2}}>

                  </div>
                  <div style={{height:4,background:"#0d0d1a",borderRadius:2,overflow:"hidden"}}>

                </div>
              )}
              {c.memo && <div style={{color:"#666",fontSize:12,marginTop:6}}>📝 {c.memo}</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function OrderTracker({ accounts, cards }) {
  const [orders, setOrders] = useLocal("iphone_orders_v3", []);
  const blank = { model:MODELS[0], orderDate:new Date().toISOString().split("T")[0], gmailAccount:"", kaitori:KAITORI_COMPANIES[0], price:"", trackingId:"", deliveryDate:"", orderNumber:"", memo:"", step:"order", payments:[] };
  const [form, setForm] = useState(blank);
  const [showForm, setShowForm] = useState(false);
  const [filterStep, setFilterStep] = useState("all");
  const [filterCard, setFilterCard] = useState("all");
  const [importOpen,setImportOpen] = useState(false);
  const [importText,setImportText] = useState("");
  const [parsed,setParsed] = useState(null);

  // ── ピックアップツール連携：起動時に自動取り込み ──
  const [pickupCount, setPickupCount] = useState(0);
  useEffect(() => {
    try {
      const raw = localStorage.getItem('pickup_queue');
      if (!raw) return;
      const queue = JSON.parse(raw);
      if (!queue || queue.length === 0) return;
      setPickupCount(queue.length);
    } catch {}
  }, []);

  function importFromPickup() {
    try {
      const raw = localStorage.getItem('pickup_queue');
      if (!raw) { alert('ピックアップツールからの転送データがありません'); return; }
      const queue = JSON.parse(raw);
      if (!queue || queue.length === 0) { alert('転送データがありません'); return; }
      // 既存注文IDと重複しないものだけ追加
      const existIds = new Set(orders.map(o=>o.id));
      const toAdd = queue.filter(o => !existIds.has(o.id));
      if (toAdd.length === 0) { alert('全て取り込み済みです'); return; }
      setOrders(prev => [...toAdd, ...prev]);
      localStorage.removeItem('pickup_queue');
      localStorage.removeItem('pickup_queue_ts');
      setPickupCount(0);
      alert(`✅ ${toAdd.length}件の注文を取り込みました`);
    } catch(e) {
      alert('取り込みエラー: ' + e.message);
    }
  }
  function doParse() {
    if (!importText.trim()) { setParsed(null); return; }
    const p = parseEmail(importText);
    // 既存注文とマッチング
    const match = p.orderNumber ? orders.find(o=>o.orderNumber===p.orderNumber) : null;
    setParsed({ ...p, matched: match });
  }
  function applyImport() {
    if (!parsed) return;
    if (parsed.matched) {
      // 既存注文のステータス遷移
      const stepMap = { order:"order", invoiced:"invoiced", delayed:"delayed", shipping:"shipping", received:"received", kaitori:"kaitori" };
      const newStep = stepMap[parsed.type] || parsed.matched.step;
      setOrders(p=>p.map(o=>o.id===parsed.matched.id?{...o,step:newStep}:o));
      alert(`注文 ${parsed.orderNumber} のステータスを「${FLOW_STEPS.find(s=>s.id===newStep)?.label||newStep}」に更新しました`);
    } else {
      // 新規注文作成
      const modelStr = [parsed.model, parsed.capacity].filter(Boolean).join(" ");
      const newOrder = { id:Date.now(), model:modelStr||MODELS[0], orderDate:new Date().toISOString().split("T")[0], gmailAccount:"", kaitori:KAITORI_COMPANIES[0], price:String(parsed.amount||""), trackingId:"", deliveryDate:"", orderNumber:parsed.orderNumber, memo:`メール取込 (${parsed.color||"色不明"})`, step:parsed.type==="unknown"?"order":parsed.type, profit:"", payments:[] };
      setOrders(p=>[newOrder,...p]);
      alert("新規注文として追加しました");
    }
    setImportText(""); setParsed(null); setImportOpen(false);
  }
  function add() { setOrders(p=>[{id:Date.now(),profit:"",...form},...p]); setShowForm(false); setForm(blank); }
  function addPayment() { setForm(f=>({...f,payments:[...(f.payments||[]),{cardId:"",method:"通常カード",amount:""}]})); }
  function updatePayment(idx,field,val) { setForm(f=>({...f,payments:f.payments.map((p,i)=>i===idx?{...p,[field]:val}:p)})); }
  function removePayment(idx) { setForm(f=>({...f,payments:f.payments.filter((_,i)=>i!==idx)})); }
  const paymentSum = (form.payments||[]).reduce((s,p)=>s+Number(p.amount||0),0);
  const priceNum = Number(form.price||0);
  const sumDelta = priceNum - paymentSum;
  function updateStep(id,step) { setOrders(p=>p.map(o=>o.id===id?{...o,step}:o)); }
  function updateProfit(id,profit) { setOrders(p=>p.map(o=>o.id===id?{...o,profit}:o)); }
  function del(id) { if(confirm("削除しますか？")) setOrders(p=>p.filter(o=>o.id!==id)); }
  function orderUsesCard(o,cid) {
    return o.payments && o.payments.some(p=>p.cardId===cid);
  }
  let filtered = filterStep==="all"?orders:orders.filter(o=>o.step===filterStep);
  if (filterCard!=="all") filtered = filtered.filter(o=>orderUsesCard(o,filterCard));
  const totalProfit = orders.filter(o=>o.profit&&o.price).reduce((s,o)=>s+Number(o.profit)-Number(o.price),0);
  const doneCount = orders.filter(o=>o.step==="done").length;
  function acctColor(email) { return accounts.find(a=>a.email===email)?.color||"#888"; }
  function acctRole(email)  { return accounts.find(a=>a.email===email)?.role||""; }
  return (

        ].map((s,i)=>(
          <div key={i} style={{background:"#1a1a2e",borderRadius:10,padding:"10px 18px",border:`1px solid ${s.color}33`}}>
            <div style={{fontSize:11,color:"#888"}}>{s.label}</div>

          </div>

      </div>
      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
        <button onClick={()=>setShowForm(!showForm)} style={{background:"#2a2a4a",color:"#aaa",border:"none",borderRadius:8,padding:"8px 16px",fontSize:13,cursor:"pointer"}}>
          ＋ 手動追加
        </button>
        <button onClick={()=>setImportOpen(!importOpen)} style={{background:"#4f8ef725",color:"#4f8ef7",border:"1px solid #4f8ef7",borderRadius:8,padding:"8px 16px",fontSize:13,cursor:"pointer",fontWeight:700}}>
          📥 メール取込
        </button>
        {/* ピックアップツール連携ボタン */}
        <button onClick={importFromPickup} style={{
          background: pickupCount>0?"#4fcf7a25":"#2a2a4a",

          position:"relative", display:"flex", alignItems:"center", gap:6
        }}>
          🚀 ピックアップ取込
          {pickupCount>0 && (
            <span style={{
              background:"#f74f6a",color:"#fff",borderRadius:"50%",

        </button>
        <a href="./iphone-pickup.html" target="_blank"

                <div style={{color:"#666"}}>一致</div><div style={{color:parsed.matched?"#4fcf7a":"#f7a84f"}}>{parsed.matched?`✓ 既存注文 (${parsed.matched.model})`:"✗ 該当なし → 新規作成"}</div>

              <button onClick={applyImport} style={{background:"#4fcf7a",color:"#111",border:"none",borderRadius:6,padding:"8px 20px",fontSize:13,cursor:"pointer",fontWeight:700,marginTop:10,width:"100%"}}>
                {parsed.matched?`✅ ステータスを「${FLOW_STEPS.find(s=>s.id===parsed.type)?.label||parsed.type}」に更新`:"➕ 新規注文として追加"}

      {showForm && (

        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",max_tokens:1000,

    if (sortCapIdx===idx) {

                {d.rows.map((r,ci)=>(
                  <th key={r.cap} onClick={()=>toggleSort(ci)} style={{padding:"10px 8px",color:sortCapIdx===ci?"#4f8ef7":"#888",borderBottom:"1px solid #2a2a4a",textAlign:"right",whiteSpace:"nowrap",cursor:"pointer",userSelect:"none"}}>
                    {r.cap}{sortCapIdx===ci?(sortDir==="desc"?" ▼":" ▲"):""}<div style={{fontSize:9,color:"#555",fontWeight:400}}>定価{yen(r.apple)}</div>
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {sortedStoreIdx().map(si=>{ const store=BUYBACK_STORES[si]; return (
                <tr key={store} style={{borderBottom:"1px solid #2a2a4a"}}>
                  <td style={{padding:"8px",color:"#fff",fontWeight:600,position:"sticky",left:0,background:"#1a1a2e",zIndex:1,whiteSpace:"nowrap"}}>{store}</td>
                  {d.rows.map(r=>{
                    const prices = pricesOf(r);
                    const p = prices[si];
                    const max = Math.max(...prices);
                    const min = Math.min(...prices);
                    const range = max-min || 1;
                    const t = (p-min)/range; // 0..1
                    const isBest = p===max;
                    const profit = p - r.apple;
                    // ヒートマップ: 赤(低)→黄(中)→緑(高)
                    const heatBg = `rgba(${Math.round(255*(1-t*0.7))},${Math.round(80+175*t)},${Math.round(60+60*t)},${0.12+t*0.35})`;
                    return (
                      <td key={r.cap} style={{padding:"8px",textAlign:"right",color:isBest?"#4fcf7a":"#ddd",fontWeight:isBest?700:500,whiteSpace:"nowrap",background:heatBg}}>
                        {isBest && <span style={{fontSize:9,color:"#4fcf7a",marginRight:3}}>★</span>}
                        {yen(p)}
                        <div style={{fontSize:9,color:profit>=0?"#4fcf7a":"#ff6666",opacity:0.85}}>{profit>=0?"+":""}{yen(profit)}</div>
                      </td>
                    );
                  })}
                </tr>
              )})}
            </tbody>
          </table>
        </div>
      )}

      {view==="full" && (
        <div style={{background:"#1a1a2e",borderRadius:10,border:"1px solid #2a2a4a",overflowX:"auto"}}>
          <table style={{borderCollapse:"collapse",fontSize:11,minWidth:720}}>
            <thead>
              <tr style={{background:"#0d0d1a"}}>
                <th rowSpan={2} style={{padding:"8px",textAlign:"left",color:"#888",position:"sticky",left:0,background:"#0d0d1a",zIndex:3,borderBottom:"1px solid #2a2a4a",borderRight:"1px solid #2a2a4a"}}>店舗</th>
                {d.rows.map(r=>(
                  <th key={r.cap} colSpan={d.colors.length} style={{padding:"6px 8px",color:"#fff",borderBottom:"1px solid #2a2a4a",borderRight:"1px solid #2a2a4a",textAlign:"center",background:"#121226"}}>
                    {r.cap}<div style={{fontSize:9,color:"#666",fontWeight:400}}>定価{yen(r.apple)}</div>
                  </th>
                ))}
              </tr>
              <tr style={{background:"#0d0d1a"}}>
                {d.rows.map(r=>d.colors.map((c,ci)=>(
                  <th key={r.cap+c} style={{padding:"6px 6px",color:"#888",borderBottom:"1px solid #2a2a4a",borderRight:ci===d.colors.length-1?"1px solid #2a2a4a":"1px solid #1a1a2e",textAlign:"right",fontSize:10,whiteSpace:"nowrap",fontWeight:500}}>{c}</th>
                )))}
              </tr>
            </thead>
            <tbody>
              {BUYBACK_STORES.map((store,si)=>(
                <tr key={store} style={{borderBottom:"1px solid #2a2a4a"}}>
                  <td style={{padding:"6px 8px",color:"#fff",fontWeight:600,position:"sticky",left:0,background:"#1a1a2e",zIndex:1,whiteSpace:"nowrap",borderRight:"1px solid #2a2a4a"}}>{store}</td>
                  {d.rows.map(r=>{
                    // best per capacity (across all colors & all stores)
                    const allPrices = d.colors.flatMap(c=>r.byColor[c]);
                    const capMax = Math.max(...allPrices);
                    return d.colors.map((c,ci)=>{
                      const p = r.byColor[c][si];
                      const isBest = p===capMax;
                      return (
                        <td key={r.cap+c} style={{padding:"6px 6px",textAlign:"right",color:isBest?"#4fcf7a":"#bbb",fontWeight:isBest?700:400,whiteSpace:"nowrap",borderRight:ci===d.colors.length-1?"1px solid #2a2a4a":"1px solid #1a1a2e"}}>
                          {isBest && <span style={{fontSize:8,color:"#4fcf7a",marginRight:2}}>★</span>}
                          {(p/1000).toFixed(1)}k
                        </td>
                      );
                    });
                  })}
                </tr>
              ))}
            </tbody>
          </table>
          <div style={{padding:"6px 10px",fontSize:10,color:"#666",borderTop:"1px solid #2a2a4a"}}>※ 数値は千円単位（例 217.0k = ¥217,000）/ ★ = その容量での全色・全店舗の最高値</div>
        </div>
      )}

      {view==="ranking" && (
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {d.rows.map(r=>{
            const prices = pricesOf(r);
            const ranked = BUYBACK_STORES.map((s,i)=>({store:s,price:prices[i]})).sort((a,b)=>b.price-a.price);
            const max = ranked[0].price;
            return (
              <div key={r.cap} style={{background:"#1a1a2e",borderRadius:10,border:"1px solid #2a2a4a",padding:12}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:8}}>
                  <div style={{color:"#fff",fontWeight:700,fontSize:14}}>{r.cap} <span style={{fontSize:11,color:"#888",fontWeight:400}}>/ {color}</span></div>
                  <div style={{fontSize:11,color:"#888"}}>Apple定価 {yen(r.apple)}</div>
                </div>
                {ranked.map((row,i)=>{
                  const profit = row.price - r.apple;
                  const pct = (row.price/max)*100;
                  return (
                    <div key={row.store} style={{display:"grid",gridTemplateColumns:"24px 1fr auto auto",gap:8,alignItems:"center",padding:"6px 0",fontSize:12,borderBottom:i<ranked.length-1?"1px solid #2a2a4a":"none"}}>
                      <div style={{color:i===0?"#4fcf7a":i<3?"#f7a84f":"#666",fontWeight:700}}>{i+1}</div>
                      <div style={{color:"#ccc",position:"relative"}}>
                        <div style={{position:"absolute",left:0,top:0,bottom:0,width:pct+"%",background:i===0?"rgba(79,207,122,0.15)":"rgba(79,142,247,0.08)",borderRadius:3}}></div>
                        <div style={{position:"relative",padding:"2px 4px"}}>{row.store}</div>
                      </div>
                      <div style={{color:i===0?"#4fcf7a":"#fff",fontWeight:i===0?700:500}}>{yen(row.price)}</div>
                      <div style={{color:profit>=0?"#4fcf7a":"#ff6666",fontSize:10,minWidth:60,textAlign:"right"}}>{profit>=0?"+":""}{yen(profit)}</div>
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>
      )}

      {view==="profit" && (() => {
        // 全機種×全容量×全色 の 最高値ベース利益率ランキング
        const rows = [];
        Object.entries(BUYBACK_DATA).forEach(([model,md])=>{
          md.rows.forEach(r=>{
            md.colors.forEach(c=>{
              const ps = r.byColor[c];
              const best = Math.max(...ps);
              const bestIdx = ps.indexOf(best);
              const profit = best - r.apple;
              const rate = profit / r.apple * 100;
              rows.push({ model, cap:r.cap, color:c, apple:r.apple, best, store:BUYBACK_STORES[bestIdx], profit, rate });
            });
          });
        });
        rows.sort((a,b)=>b.rate-a.rate);
        return (
          <div style={{background:"#1a1a2e",borderRadius:10,border:"1px solid #2a2a4a",overflowX:"auto"}}>
            <table style={{borderCollapse:"collapse",width:"100%",fontSize:12,minWidth:700}}>
              <thead>
                <tr style={{background:"#0d0d1a"}}>
                  <th style={{padding:"10px 8px",textAlign:"left",color:"#888",borderBottom:"1px solid #2a2a4a"}}>#</th>
                  <th style={{padding:"10px 8px",textAlign:"left",color:"#888",borderBottom:"1px solid #2a2a4a"}}>機種</th>
                  <th style={{padding:"10px 8px",textAlign:"left",color:"#888",borderBottom:"1px solid #2a2a4a"}}>容量</th>
                  <th style={{padding:"10px 8px",textAlign:"left",color:"#888",borderBottom:"1px solid #2a2a4a"}}>色</th>
                  <th style={{padding:"10px 8px",textAlign:"right",color:"#888",borderBottom:"1px solid #2a2a4a"}}>定価</th>
                  <th style={{padding:"10px 8px",textAlign:"right",color:"#888",borderBottom:"1px solid #2a2a4a"}}>最高値</th>
                  <th style={{padding:"10px 8px",textAlign:"left",color:"#888",borderBottom:"1px solid #2a2a4a"}}>店舗</th>
                  <th style={{padding:"10px 8px",textAlign:"right",color:"#888",borderBottom:"1px solid #2a2a4a"}}>利益</th>
                  <th style={{padding:"10px 8px",textAlign:"right",color:"#888",borderBottom:"1px solid #2a2a4a"}}>利益率</th>
                </tr>
              </thead>
              <tbody>
                {rows.map((r,i)=>{
                  const pcol = r.profit>=0?"#4fcf7a":"#ff6666";
                  const rank = i<3 ? ["🥇","🥈","🥉"][i] : String(i+1);
                  return (
                    <tr key={i} style={{borderBottom:"1px solid #2a2a4a",background:i<3?"rgba(79,207,122,0.05)":"transparent"}}>
                      <td style={{padding:"8px",color:"#aaa"}}>{rank}</td>
                      <td style={{padding:"8px",color:"#fff",whiteSpace:"nowrap"}}>{r.model.replace("iPhone ","")}</td>
                      <td style={{padding:"8px",color:"#ccc"}}>{r.cap}</td>
                      <td style={{padding:"8px",color:"#ccc",whiteSpace:"nowrap"}}>{r.color}</td>
                      <td style={{padding:"8px",textAlign:"right",color:"#888"}}>{yen(r.apple)}</td>
                      <td style={{padding:"8px",textAlign:"right",color:"#fff",fontWeight:600}}>{yen(r.best)}</td>
                      <td style={{padding:"8px",color:"#4f8ef7",whiteSpace:"nowrap"}}>{r.store}</td>
                      <td style={{padding:"8px",textAlign:"right",color:pcol,fontWeight:700,whiteSpace:"nowrap"}}>{r.profit>=0?"+":""}{yen(r.profit)}</td>
                      <td style={{padding:"8px",textAlign:"right",color:pcol,fontWeight:700}}>{r.rate.toFixed(2)}%</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        );
      })()}

      <div style={{marginTop:12,padding:"10px 12px",background:"#1a1a2e",borderRadius:8,borderLeft:"3px solid #f7a84f",fontSize:11,color:"#aaa",lineHeight:1.6}}>
        カラー: {d.colors.join(" / ")}<br/>
        ★ = その容量×色で最高値の店舗 / 利益 = 買取価格 − Apple定価 / セル背景は価格のヒートマップ（緑=高,赤=低）
      </div>
    </div>
  );
}
// ============================================================
// MAIN
// ============================================================
const TABS = [
  {id:"tracker",label:"📋 注文管理"},
  {id:"buyback",label:"💰 買取相場"},
  {id:"cards",  label:"💳 カード管理"},
  {id:"gmail",  label:"📧 Gmail管理"},
  {id:"address",label:"🏠 住所生成"},
  {id:"caution",label:"⚠️ 注意事項"},
  {id:"info",   label:"📡 情報収集"},
];
function App() {
  const [tab,setTab] = useState("tracker");
  const [accounts,setAccounts] = useLocal("iphone_gmail_accounts",[]);
  const [cards,setCards] = useLocal("iphone_cards_v1",[]);
  const [orders] = useLocal("iphone_orders_v3",[]);
  const [theme,setTheme] = useLocal("iphone_theme","dark");
  const light = theme==="light";
  return (
    <div style={{minHeight:"100vh",background:"#0d0d1a",fontFamily:"'Noto Sans JP','Hiragino Sans',sans-serif",color:"#e0e0e0",paddingBottom:40,filter:light?"invert(0.92) hue-rotate(180deg)":"none"}}>
      <div style={{background:"linear-gradient(135deg,#0d0d1a,#1a1a3a)",borderBottom:"1px solid #2a2a4a",padding:"20px 20px 0"}}>
        <div style={{maxWidth:720,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
            <div style={{width:42,height:42,borderRadius:10,background:"linear-gradient(135deg,#4f8ef7,#b94ff7)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>📱</div>
            <div style={{flex:1}}>
              <div style={{fontSize:20,fontWeight:900,color:"#fff",letterSpacing:-0.5}}>iPhone転売 管理ツール</div>
              <div style={{fontSize:12,color:"#555"}}>Noe Dolphin / 投資部門</div>
            </div>
            <button onClick={()=>setTheme(light?"dark":"light")} title={light?"ダークモードへ":"ライトモードへ"} style={{background:"#1a1a2e",color:light?"#f7d04f":"#4f8ef7",border:"1px solid #2a2a4a",borderRadius:20,padding:"6px 14px",fontSize:16,cursor:"pointer"}}>{light?"☀️":"🌙"}</button>
          </div>
          <div style={{display:"flex",gap:0,overflowX:"auto"}}>
            {TABS.map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{
                background:tab===t.id?"#1a1a2e":"transparent",
                color:tab===t.id?"#4f8ef7":"#666",
                border:"none",borderBottom:tab===t.id?"2px solid #4f8ef7":"2px solid transparent",
                padding:"10px 14px",fontSize:12,cursor:"pointer",fontWeight:tab===t.id?700:400,
                whiteSpace:"nowrap",transition:"all 0.15s",
              }}>{t.label}</button>
            ))}
          </div>
        </div>
      </div>
      <div style={{maxWidth:720,margin:"24px auto 0",padding:"0 16px"}}>
        {tab==="tracker"&&<><h2 style={ST}>📋 注文管理</h2><OrderTracker accounts={accounts} cards={cards}/></>}
        {tab==="buyback"&&<><h2 style={ST}>💰 iPhone 17 買取相場</h2><BuybackPanel/></>}
        {tab==="cards"&&(
          <>
            <h2 style={ST}>💳 カード管理</h2>
            <p style={{color:"#888",fontSize:13,marginBottom:16}}>
              仕入れに使うカードを一元管理。注文の支払い内訳と自動的に紐付いて、カード別の購入台数・総額・月間枠消化率が見えます。
            </p>
            <CardManager cards={cards} setCards={setCards} orders={orders}/>
          </>
        )}
        {tab==="gmail"&&(
          <>
            <h2 style={ST}>📧 Gmailアカウント管理</h2>
            <p style={{color:"#888",fontSize:13,marginBottom:16}}>
              注文に使用するGmailアカウントを一元管理。カラー識別で注文との紐付けを即確認できます。
            </p>
            <GmailManager accounts={accounts} setAccounts={setAccounts} orders={orders}/>
          </>
        )}
        {tab==="address"&&<><h2 style={ST}>🏠 住所バリアント生成</h2><AddressPanel/></>}
        {tab==="caution"&&<><h2 style={ST}>⚠️ フロー別 注意事項</h2><CautionPanel/></>}
        {tab==="info"&&<><h2 style={ST}>📡 情報収集（Web検索）</h2><InfoFeed/></>}
      </div>
    </div>
  );
}
// ============================================================
// SHARED STYLES
// ============================================================
const IS = {background:"#0d0d1a",border:"1px solid #2a2a4a",borderRadius:6,color:"#e0e0e0",padding:"7px 10px",fontSize:13,width:"100%",boxSizing:"border-box",outline:"none"};
const LS = {display:"block",color:"#888",fontSize:12,marginBottom:4};
const ST = {color:"#fff",fontSize:18,fontWeight:800,marginBottom:8,marginTop:0};
function chipBtn(active,color="#4f8ef7"){
  return {background:active?color+"25":"#1a1a2e",color:active?color:"#888",border:`1px solid ${active?color:"#2a2a4a"}`,borderRadius:20,padding:"5px 14px",fontSize:12,cursor:"pointer",fontWeight:active?700:400};
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body></html>
